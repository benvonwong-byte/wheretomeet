name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Check Routes key present
        env:
          ROUTES_WEB_KEY: ${{ secrets.ROUTES_WEB_KEY }}
        run: |
          if [ -z "$ROUTES_WEB_KEY" ]; then
            echo "::warning::ROUTES_WEB_KEY secret is empty — Google Routes geometry tier will be disabled in this build"
          fi
      - run: npm run build
        env:
          PAGES_BASE: /
          VITE_ROUTES_KEY: ${{ secrets.ROUTES_WEB_KEY }}
      # Beta test-drive: the group-v2 branch rides along at /beta/. Best-effort —
      # a broken beta must never block the main site's deploy.
      - name: Build group-v2 beta into dist/beta
        continue-on-error: true
        env:
          VITE_ROUTES_KEY: ${{ secrets.ROUTES_WEB_KEY }}
        run: |
          set -e
          git fetch --depth 1 origin group-v2
          git worktree add /tmp/beta origin/group-v2
          cd /tmp/beta
          npm ci
          npx vitest run
          PAGES_BASE=/beta/ npm run build
          mkdir -p "$GITHUB_WORKSPACE/dist/beta"
          cp -r dist/* "$GITHUB_WORKSPACE/dist/beta/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
