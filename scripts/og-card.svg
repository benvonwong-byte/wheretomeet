<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- All-vector: no emoji (rsvg renders them monochrome), no outer frame. -->
  <defs>
    <radialGradient id="heatA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#61a60e" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#61a60e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heatB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7b2cbf" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heatMid" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffcd14" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffcd14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcd14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- faint street grid -->
  <g stroke="#e4e9df" stroke-width="2">
    <path d="M0 90 H1200 M0 190 H1200 M0 290 H1200 M0 390 H1200 M0 490 H1200 M0 590 H1200"/>
    <path d="M120 0 V630 M260 0 V630 M400 0 V630 M540 0 V630 M680 0 V630 M820 0 V630 M960 0 V630 M1100 0 V630"/>
  </g>

  <!-- advantage heat: green (A) → gold (fair) → purple (B), anchored right -->
  <ellipse cx="680" cy="470" rx="420" ry="300" fill="url(#heatA)"/>
  <ellipse cx="1090" cy="200" rx="420" ry="320" fill="url(#heatB)"/>
  <ellipse cx="895" cy="330" rx="330" ry="260" fill="url(#heatMid)"/>

  <!-- dashed routes: A and B converge on the fair spot -->
  <g fill="none" stroke-linecap="round">
    <path d="M700 480 C 760 470, 810 420, 862 366" stroke="#4f8f00" stroke-width="7" stroke-dasharray="2 16"/>
    <path d="M1075 170 C 1030 200, 980 250, 936 296" stroke="#7b2cbf" stroke-width="7" stroke-dasharray="2 16"/>
  </g>

  <!-- context venue dots -->
  <g stroke="#ffffff" stroke-width="5">
    <circle cx="800" cy="270" r="15" fill="#e0445a"/>
    <circle cx="985" cy="415" r="15" fill="#f08c1d"/>
  </g>

  <!-- person pins -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="bold" text-anchor="middle">
    <circle cx="700" cy="490" r="38" fill="#4f8f00" stroke="#ffffff" stroke-width="7"/>
    <text x="700" y="505" font-size="42" fill="#ffffff">A</text>
    <circle cx="1080" cy="150" r="38" fill="#7b2cbf" stroke="#ffffff" stroke-width="7"/>
    <text x="1080" y="165" font-size="42" fill="#ffffff">B</text>
  </g>

  <!-- the fair spot: white pin, green ring, vector leaf, gold star -->
  <g>
    <circle cx="900" cy="330" r="46" fill="#ffffff" stroke="#61a60e" stroke-width="9"/>
    <path d="M900 352 C 884 340, 878 320, 888 306 C 906 302, 920 316, 918 336 C 912 346, 906 350, 900 352 Z"
      fill="#61a60e"/>
    <path d="M900 352 C 902 336, 908 322, 916 312" stroke="#3f7212" stroke-width="3" fill="none" stroke-linecap="round"/>
    <g transform="translate(938,282)">
      <circle r="20" fill="#ffcd14" stroke="#ffffff" stroke-width="4"/>
      <path d="M0,-11 L3.2,-3.6 L11,-3.4 L4.9,1.6 L7,9 L0,4.6 L-7,9 L-4.9,1.6 L-11,-3.4 L-3.2,-3.6 Z" fill="#8a6d00"/>
    </g>
  </g>

  <!-- headline block -->
  <text x="76" y="118" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="27"
    letter-spacing="6" fill="#4f8f00">STRUGGLING TO VEGAN IN NYC?</text>
  <text x="72" y="212" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="92"
    fill="#1f2617">Struggle <tspan font-style="italic" fill="#61a60e">no more.</tspan></text>
  <text x="76" y="278" font-family="Helvetica, Arial, sans-serif" font-size="31" fill="#3c4433">Two addresses in — fair vegan spots out,</text>
  <text x="76" y="322" font-family="Helvetica, Arial, sans-serif" font-size="31" fill="#3c4433">ranked by real subway, bike, car &amp; walk</text>
  <text x="76" y="366" font-family="Helvetica, Arial, sans-serif" font-size="31" fill="#3c4433">times — for <tspan font-weight="bold">both</tspan> of you.</text>

  <!-- feature chips -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="20" letter-spacing="2">
    <rect x="76" y="404" rx="21" width="196" height="42" fill="#ecf6df" stroke="#61a60e" stroke-width="2.5"/>
    <text x="99" y="432" fill="#47791a">FULLY VEGAN</text>
    <rect x="288" y="404" rx="21" width="210" height="42" fill="#e5f2fc" stroke="#4a90d9" stroke-width="2.5"/>
    <text x="311" y="432" fill="#2a6099">GLUTEN-FREE</text>
    <rect x="514" y="404" rx="21" width="192" height="42" fill="#fff5d6" stroke="#e2a400" stroke-width="2.5"/>
    <text x="537" y="432" fill="#96700a">TEA HOUSES</text>
  </g>

  <!-- brand footer -->
  <g>
    <rect x="60" y="512" width="620" height="72" rx="16" fill="#ffffff" opacity="0.95"/>
    <circle cx="106" cy="548" r="17" fill="#4f8f00"/>
    <text x="106" y="555" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="19"
      fill="#ffffff" text-anchor="middle">A</text>
    <circle cx="136" cy="548" r="17" fill="#7b2cbf"/>
    <text x="136" y="555" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="19"
      fill="#ffffff" text-anchor="middle">B</text>
    <text x="170" y="562" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="40"
      fill="#1f2617">Thyme <tspan fill="#61a60e" font-style="italic">&amp;</tspan> Place</text>
    <text x="520" y="560" font-family="Helvetica, Arial, sans-serif" font-size="21" letter-spacing="3"
      fill="#7f8874">FREE · NYC</text>
  </g>
</svg>
